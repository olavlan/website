<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <script>
    var path = window.location.pathname;
    var redirectUrl = window.location.origin + path.substring(0, path.lastIndexOf('/') + 1) + '?path=' + encodeURIComponent(path);
    window.location.replace(redirectUrl);
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
